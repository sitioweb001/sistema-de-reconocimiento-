<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asistencia Pro v5.0 - Gestión Total</title>
    
    <script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background: #1a1a2e; 
            color: white; 
            margin: 0; 
            padding-bottom: 50px; 
            transition: 0.3s;
        }

        /* Modo Luz */
        body.modo-luz { background: #ffffff; color: #111; }
        body.modo-luz .navbar { background: #ddd; color: #111; }
        body.modo-luz .card { background: #f0f0f0; color: #111; border: 1px solid #ccc; }

        /* Navegación */
        .navbar { 
            background: #111122; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            position: sticky; top: 0; z-index: 1000;
        }
        .navbar-brand { font-weight: bold; cursor: pointer; user-select: none; }
        .nav-btns { display: flex; gap: 8px; }
        .btn-nav { background: #3498db; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; }

        .main-container { padding: 15px; max-width: 450px; margin: 0 auto; }

        /* Video */
        .contenedor-video { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 4/3; 
            margin: 15px 0; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6); 
            background: #000;
            border: 2px solid #3e3e5e;
        }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        #estado { font-weight: bold; min-height: 60px; display: flex; align-items: center; justify-content: center; color: #ff4b5c; padding: 10px; }

        /* Secciones */
        .seccion { display: none; animation: fadeIn 0.4s; }
        .seccion.activa { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* Controles */
        button, input, select { width: 100%; padding: 16px; margin-bottom: 12px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; }
        button { cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.96); }

        .herramientas { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-tool { background: #4a4e69; color: white; flex: 1; font-size: 13px; padding: 12px; }

        .btn-ent { background: #2ecc71; color: white; }
        .btn-sal { background: #e74c3c; color: white; }
        .btn-pdf { background: #f39c12; color: white; margin-top: 15px; }

        .input-pin { border: 3px solid #f1c40f; background: #fffde7 !important; color: #333 !important; text-align: center; }

        /* Tarjetas */
        .card { background: rgba(255,255,255,0.06); padding: 20px; border-radius: 18px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .tabla-scroll { width: 100%; overflow-x: auto; border-radius: 12px; margin-top: 15px; max-height: 300px; }
        table { width: 100%; border-collapse: collapse; background: white; color: #333; font-size: 11px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        th { background: #2c3e50; color: white; position: sticky; top: 0; }

        #pantalla-bloqueo { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="pantalla-bloqueo">
        <div style="font-size:100px; color:#f1c40f; cursor:pointer;" onclick="intentarDesbloqueo()">❗</div>
        <h2>SISTEMA BLOQUEADO</h2>
    </div>

    <div class="navbar">
        <div class="navbar-brand" onclick="intentarBloqueo()">Asistencia Pro</div>
        <div class="nav-btns">
            <button class="btn-nav" id="btn-h" onclick="verSeccion('sec-historial')">Historial</button>
            <button class="btn-nav" id="btn-r" onclick="verSeccion('sec-registro')">Registro</button>
            <button class="btn-nav" id="btn-v" onclick="verSeccion('sec-principal')" style="display:none; background:#555;">Volver</button>
        </div>
    </div>

    <div class="main-container">
        
        <p id="estado">Iniciando...</p>

        <div class="herramientas">
            <button class="btn-tool" onclick="document.body.classList.toggle('modo-luz')">💡 Luz</button>
            <button class="btn-tool" onclick="girarCamara()">🔄 Girar Cámara</button>
        </div>

        <div class="contenedor-video">
            <video id="video" playsinline autoplay muted></video>
            <canvas id="canvas"></canvas>
        </div>

        <div id="sec-principal" class="seccion activa">
            <input type="password" id="pinMarcaje" class="input-pin" placeholder="🔑 Ingresa PIN">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-ent" onclick="marcar('Entrada')">ENTRADA</button>
                <button class="btn-sal" onclick="marcar('Salida')">SALIDA</button>
            </div>
        </div>

        <div id="sec-registro" class="seccion">
            <div class="card">
                <h3>Nuevo Usuario</h3>
                <button onclick="escanear()" id="btn-scan" style="background:#34495e; color:white;">1. Capturar Rostro</button>
                <div id="form-reg" style="display:none; margin-top: 15px;">
                    <p style="color:#2ecc71; font-weight:bold;">✓ Rostro capturado.</p>
                    <input type="text" id="regNombre" placeholder="Nombre">
                    <input type="number" id="regPin" placeholder="PIN">
                    <button onclick="guardar()" style="background:#27ae60; color:white;">2. Guardar Usuario</button>
                </div>
            </div>
        </div>

        <div id="sec-historial" class="seccion">
            <div class="card">
                <h3>Historial</h3>
                <label style="font-size: 11px;">Filtrar Fecha (Vacio para reporte mensual):</label>
                <input type="date" id="filtroFecha" onchange="renderHistorial()">
                <div class="tabla-scroll">
                    <table id="tablaH">
                        <thead><tr><th>Nombre</th><th>Tipo</th><th>Acción</th><th>Hora</th></tr></thead>
                        <tbody id="bodyH"></tbody>
                    </table>
                </div>
                <button class="btn-pdf" onclick="generarPDF()">📄 Generar PDF (Día / Mes)</button>
            </div>
        </div>

    </div>

    <script>
        // CONFIGURACIÓN
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxwLkaOTgC9M8_z7_ZpmMspWK8L_0zr3RKmEuCy27VTSWKhOrriul91tff6RZFZPnKv/exec"; 
        const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const estado = document.getElementById('estado');

        let usuariosDB = [], historialDB = [], modelosCargados = false, rostroTemp = null, modoCam = "user";

        // --- NAVEGACIÓN ---
        function verSeccion(id) {
            document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
            document.getElementById('btn-h').style.display = (id === 'sec-principal') ? 'block' : 'none';
            document.getElementById('btn-r').style.display = (id === 'sec-principal') ? 'block' : 'none';
            document.getElementById('btn-v').style.display = (id === 'sec-principal') ? 'none' : 'block';
            if(id === 'sec-historial') renderHistorial();
        }

        // --- CÁMARA ---
        async function init() {
            try {
                const res = await fetch(URL_SCRIPT);
                const data = await res.json();
                if (data.estado === "mantenimiento") { document.getElementById('pantalla-bloqueo').style.display="flex"; return; }
                usuariosDB = data.usuarios; historialDB = data.historial;
                
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                
                startVideo();
            } catch (e) { estado.innerText = "Error de conexión."; }
        }

        function startVideo() {
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            navigator.mediaDevices.getUserMedia({ video: { facingMode: modoCam } }).then(s => {
                video.srcObject = s;
                video.style.transform = (modoCam === "user") ? "scaleX(-1)" : "scaleX(1)";
                canvas.style.transform = (modoCam === "user") ? "scaleX(-1)" : "scaleX(1)";
                modelosCargados = true; estado.innerText = "LISTO";
            });
        }

        function girarCamara() { modoCam = (modoCam === "user") ? "environment" : "user"; startVideo(); }

        video.addEventListener('play', () => {
            const size = { width: video.videoWidth || 400, height: video.videoHeight || 300 };
            faceapi.matchDimensions(canvas, size);
            setInterval(async () => {
                if (!modelosCargados) return;
                const dets = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
                canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
                faceapi.draw.drawDetections(canvas, faceapi.resizeResults(dets, size));
            }, 80);
        });

        // --- ASISTENCIA ---
        async function marcar(accion) {
            const pin = document.getElementById('pinMarcaje').value.trim();
            if (pin !== "") {
                const u = usuariosDB.find(usr => usr[2].toString() === pin);
                if (u) send(u[0], "PIN", accion); else alert("PIN Incorrecto.");
                return;
            }
            estado.innerText = "Identificando...";
            const det = await faceapi.detectSingleFace(video, new faceapi.SsdMobilenetv1Options()).withFaceLandmarks().withFaceDescriptor();
            if (!det) return alert("Rostro no detectado.");
            let best = { n: "Desconocido", d: 1 };
            usuariosDB.forEach(u => {
                const dist = faceapi.euclideanDistance(det.descriptor, new Float32Array(JSON.parse(u[1])));
                if (dist < 0.45 && dist < best.d) best = { n: u[0], d: dist };
            });
            if (best.n !== "Desconocido") send(best.n, "Rostro", accion);
            else alert("No reconocido.");
        }

        async function send(nombre, metodo, accion) {
            estado.innerText = "Guardando...";
            await fetch(URL_SCRIPT, { method:'POST', mode:'no-cors', body: JSON.stringify({ tipo: "marcaje", nombre, metodo, accion }) });
            alert(`✅ ${accion}: ${nombre}`); location.reload();
        }

        // --- REGISTRO ---
        async function escanear() {
            estado.innerText = "Capturando...";
            const det = await faceapi.detectSingleFace(video, new faceapi.SsdMobilenetv1Options()).withFaceLandmarks().withFaceDescriptor();
            if (det) {
                rostroTemp = Array.from(det.descriptor);
                document.getElementById('btn-scan').style.display="none";
                document.getElementById('form-reg').style.display="block";
                estado.innerText = "✓ Capturado";
            } else { alert("Error al capturar."); }
        }

        async function guardar() {
            const n = document.getElementById('regNombre').value.trim();
            const p = document.getElementById('regPin').value.trim();
            if (!n || !p) return alert("Datos incompletos.");
            await fetch(URL_SCRIPT, { method:'POST', mode:'no-cors', body: JSON.stringify({ tipo:"registro_facial", nombre:n, pin:p, descriptor:rostroTemp }) });
            alert("¡Guardado!"); location.reload();
        }

        // --- REPORTES Y PDF ---
        function renderHistorial() {
            const f = document.getElementById('filtroFecha').value;
            const c = document.getElementById('bodyH');
            c.innerHTML = "";
            historialDB.forEach(row => {
                const d = new Date(row[3]);
                const ds = d.toISOString().split('T')[0];
                if (!f || ds === f) {
                    c.innerHTML += `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${d.toLocaleTimeString()}</td></tr>`;
                }
            });
        }

        function generarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const fechaInput = document.getElementById('filtroFecha').value;
            
            let titulo = "";
            let dataFiltrada = [];
            const counts = {};

            const hoy = new Date();
            const mesActual = hoy.getMonth();
            const añoActual = hoy.getFullYear();

            if (fechaInput) {
                // REPORTE DIARIO
                titulo = "REPORTE DE ASISTENCIA DIARIO - " + fechaInput;
                dataFiltrada = historialDB.filter(row => new Date(row[3]).toISOString().split('T')[0] === fechaInput);
            } else {
                // REPORTE MENSUAL AUTOMÁTICO
                const meses = ["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
                titulo = "INFORME MENSUAL: " + meses[mesActual] + " " + añoActual;
                dataFiltrada = historialDB.filter(row => {
                    const d = new Date(row[3]);
                    return d.getMonth() === mesActual && d.getFullYear() === añoActual;
                });
            }

            // Diseño
            doc.setFillColor(30, 30, 47); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255); doc.setFontSize(18); doc.text(titulo, 15, 25);
            doc.setFontSize(10); doc.text("Generado el: " + hoy.toLocaleString(), 15, 33);

            const filas = [];
            dataFiltrada.forEach(row => {
                const d = new Date(row[3]);
                filas.push([row[0], row[1], row[2], d.toLocaleDateString() + " " + d.toLocaleTimeString()]);
                counts[row[0]] = (counts[row[0]] || 0) + 1;
            });

            doc.autoTable({ startY: 50, head: [['Nombre', 'Método', 'Acción', 'Fecha y Hora']], body: filas, theme: 'striped', headStyles: {fillColor:[30, 30, 47]} });
            
            let y = doc.lastAutoTable.finalY + 15;
            doc.setTextColor(0); doc.setFontSize(14); doc.text("Resumen de Frecuencia", 15, y);
            Object.keys(counts).forEach((n, i) => { doc.setFontSize(10); doc.text(`${n}: ${counts[n]} marcajes registrados.`, 15, y + 10 + (i * 7)); });
            
            doc.save(`Reporte_Asistencia_${titulo.replace(/ /g,"_")}.pdf`);
        }

        // BLOQUEOS
        let cb=0; function intentarBloqueo(){cb++; if(cb===3){if(prompt("PIN:")==="1234") fetch(URL_SCRIPT,{method:'POST',mode:'no-cors',body:JSON.stringify({tipo:"cambiar_estado",nuevoEstado:"mantenimiento"})}).then(()=>location.reload()); cb=0;} setTimeout(()=>cb=0,2000);}
        let cd=0; function intentarDesbloqueo(){cd++; if(cd===2){if(prompt("PIN:")==="1234") fetch(URL_SCRIPT,{method:'POST',mode:'no-cors',body:JSON.stringify({tipo:"cambiar_estado",nuevoEstado:"activo"})}).then(()=>location.reload()); cd=0;} setTimeout(()=>cd=0,2000);}

        init();
    </script>
</body>
</html>
