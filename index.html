<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asistencia Premium Anti-Lag</title>
    
    <script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #1a1a2e; color: white; margin: 0; padding-bottom: 60px; transition: 0.3s; }
        body.modo-luz { background: #ffffff; color: #111111; }
        body.modo-luz .navbar { background: #e0e0e0; color: #111; border-bottom: 1px solid #ccc; }
        body.modo-luz .card { background: #f9f9f9; color: #111; border: 1px solid #ddd; }

        .navbar { background: #111122; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: sticky; top: 0; z-index: 1000; }
        .navbar-brand { font-weight: 800; font-size: 1.2em; letter-spacing: 1px; cursor: pointer; user-select: none; }
        .nav-btns { display: flex; gap: 10px; }
        .btn-nav { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; }

        .main-container { padding: 20px; max-width: 480px; margin: 0 auto; }

        .contenedor-video { position: relative; width: 100%; aspect-ratio: 4/3; margin: 20px 0; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.6); background: #000; border: 3px solid #3e3e5e; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        #estado { font-weight: bold; min-height: 70px; display: flex; align-items: center; justify-content: center; color: #ff4b5c; padding: 10px; font-size: 1.1em; line-height: 1.3; }

        .seccion { display: none; animation: slideUp 0.4s ease-out; }
        .seccion.activa { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        button, input, select { width: 100%; padding: 18px; margin-bottom: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; outline: none; }
        button { cursor: pointer; transition: 0.1s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        button:active { transform: scale(0.97); box-shadow: none; }

        .herramientas { display: flex; gap: 12px; margin-bottom: 15px; }
        .btn-tool { background: #4a4e69; color: white; flex: 1; font-size: 14px; padding: 14px; }

        .grid-marcaje { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-ent { background: #2ecc71; color: white; }
        .btn-sal { background: #e74c3c; color: white; }
        
        .btn-scan { background: #34495e; color: white; border: 2px solid #2c3e50; }
        .btn-save { background: #27ae60; color: white; margin-top: 10px; }
        .btn-pdf { background: #f39c12; color: white; margin-top: 20px; padding: 20px;}

        .input-pin { border: 3px solid #f1c40f; background: #fffde7 !important; color: #333 !important; text-align: center; font-size: 1.3em; letter-spacing: 3px; }

        .card { background: rgba(255,255,255,0.06); padding: 25px; border-radius: 20px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .tabla-scroll { width: 100%; overflow-x: auto; border-radius: 12px; margin-top: 20px; max-height: 350px; }
        table { width: 100%; border-collapse: collapse; background: white; color: #333; font-size: 12px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background: #2c3e50; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background: #f9f9f9; }

        #pantalla-bloqueo { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        .icono-bloqueo { font-size: 120px; color: #f1c40f; cursor: pointer; user-select: none; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="pantalla-bloqueo">
        <div class="icono-bloqueo" onclick="intentarDesbloqueo()">❗</div>
        <h1 style="letter-spacing: 2px;">SISTEMA BLOQUEADO</h1>
        <p style="color: #aaa; font-size: 14px;">Mantenimiento Activado.</p>
    </div>

    <div class="navbar">
        <div class="navbar-brand" onclick="intentarBloqueo()">Asistencia Pro</div>
        <div class="nav-btns">
            <button class="btn-nav" id="btn-h" onclick="cambiarSeccion('sec-historial')">Historial</button>
            <button class="btn-nav" id="btn-r" onclick="cambiarSeccion('sec-registro')">Registro</button>
            <button class="btn-nav" id="btn-v" onclick="cambiarSeccion('sec-principal')" style="display:none; background:#444;">Volver</button>
        </div>
    </div>

    <div class="main-container">
        
        <p id="estado">Iniciando y Verificando Seguridad...</p>

        <div class="herramientas">
            <button class="btn-tool" onclick="document.body.classList.toggle('modo-luz')">💡 Luz</button>
            <button class="btn-tool" onclick="girarCamara()">🔄 Girar Cámara</button>
        </div>

        <div class="contenedor-video">
            <video id="video" playsinline autoplay muted></video>
            <canvas id="canvas"></canvas>
        </div>

        <div id="sec-principal" class="seccion activa">
            <input type="password" id="pinMarcaje" class="input-pin" placeholder="Ingrese su PIN aquí">
            <div class="grid-marcaje">
                <button class="btn-ent" onclick="procesarMarcaje('Entrada')">MARCAR ENTRADA</button>
                <button class="btn-sal" onclick="procesarMarcaje('Salida')">MARCAR SALIDA</button>
            </div>
            <p style="font-size: 12px; color: #888; margin-top: 25px;">Para marcar con biometría, sitúe su rostro frente a la cámara.</p>
        </div>

        <div id="sec-registro" class="seccion">
            <div class="card">
                <h2 style="margin:0 0 20px 0; color:#3498db;">Alta de Personal</h2>
                <button onclick="iniciarEscaneoRegistro()" id="btn-iniciar-scan" class="btn-scan">1. Escanear Facciones</button>
                <div id="form-registro-oculto" style="display:none; margin-top: 20px;">
                    <p style="color:#2ecc71; font-weight:bold; font-size: 15px;">✓ Patrón Capturado.</p>
                    <input type="text" id="regNombre" placeholder="Nombre y Apellido">
                    <input type="number" id="regPin" placeholder="PIN de Seguridad">
                    <button onclick="finalizarGuardadoUsuario()" class="btn-save">2. Guardar en Base de Datos</button>
                </div>
            </div>
        </div>

        <div id="sec-historial" class="seccion">
            <div class="card">
                <h2 style="margin:0 0 15px 0; color:#f39c12;">Visor de Registros</h2>
                <label style="font-size: 13px; font-weight: bold;">Filtrar por Fecha (Vacío = Reporte Mensual):</label>
                <input type="date" id="filtroFecha" onchange="renderizarTablaHistorial()" style="margin-top: 10px;">
                <div class="tabla-scroll">
                    <table id="tablaRegistros">
                        <thead><tr><th>Nombre</th><th>Método</th><th>Acción</th><th>Hora</th></tr></thead>
                        <tbody id="cuerpoTablaHistorial"></tbody>
                    </table>
                </div>
                <button class="btn-pdf" onclick="generarReporteInteligentePDF()">📄 DESCARGAR PDF</button>
            </div>
        </div>

    </div>

    <script>
        // --- 1. CONFIGURACIÓN ---
        // ¡CUIDADO! DEBES PONER TU URL. SI DEJAS ESTO ASÍ, TE DARÁ ERROR.
        const URL_BACKEND = "TU_URL_DE_APPS_SCRIPT_AQUI"; 
        
        const URL_MODELOS = 'https://justadudewhohacks.github.io/face-api.js/models';
        const videoDOM = document.getElementById('video');
        const canvasDOM = document.getElementById('canvas');
        const labelEstado = document.getElementById('estado');

        let dbUsuarios = [], dbHistorial = [];
        let isReady = false;
        let isDetecting = false; // <-- LA CLAVE PARA EL ANTI-LAG
        let descriptorFacialTemporal = null;
        let usarCamaraFrontal = true;

        // Validar URL
        if (URL_BACKEND.includes("TU_URL")) {
            labelEstado.innerText = "ALERTA: Debes poner tu URL de Google Apps Script en el código (Línea 246).";
            labelEstado.style.color = "red";
        }

        function cambiarSeccion(idDestino) {
            document.querySelectorAll('.seccion').forEach(sec => sec.classList.remove('activa'));
            document.getElementById(idDestino).classList.add('activa');
            const esInicio = (idDestino === 'sec-principal');
            document.getElementById('btn-h').style.display = esInicio ? 'block' : 'none';
            document.getElementById('btn-r').style.display = esInicio ? 'block' : 'none';
            document.getElementById('btn-v').style.display = esInicio ? 'none' : 'block';
            if(idDestino === 'sec-historial') renderizarTablaHistorial();
            if(idDestino === 'sec-registro') reiniciarFormularioRegistro();
        }

        function reiniciarFormularioRegistro() {
            descriptorFacialTemporal = null;
            document.getElementById('btn-iniciar-scan').style.display = 'block';
            document.getElementById('form-registro-oculto').style.display = 'none';
            document.getElementById('regNombre').value = "";
            document.getElementById('regPin').value = "";
        }

        async function arrancarSistema() {
            try {
                labelEstado.innerText = "Conectando al servidor backend...";
                const respuesta = await fetch(URL_BACKEND);
                const datosJson = await respuesta.json();
                
                if (datosJson.estado === "mantenimiento") { 
                    document.getElementById('pantalla-bloqueo').style.display = "flex"; return; 
                }
                
                dbUsuarios = datosJson.usuarios; 
                dbHistorial = datosJson.historial;
                
                labelEstado.innerText = "Cargando Motores de IA...";
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(URL_MODELOS), 
                    faceapi.nets.faceLandmark68Net.loadFromUri(URL_MODELOS), 
                    faceapi.nets.faceRecognitionNet.loadFromUri(URL_MODELOS), 
                    faceapi.nets.tinyFaceDetector.loadFromUri(URL_MODELOS)
                ]);
                
                iniciarTransmisionVideo();
            } catch (error) { 
                labelEstado.innerText = "ERROR DE CONEXIÓN. ¿Actualizaste tu URL y diste permisos a 'Cualquiera' en Apps Script?"; 
                labelEstado.style.color = "red";
            }
        }

        function iniciarTransmisionVideo() {
            if (videoDOM.srcObject) videoDOM.srcObject.getTracks().forEach(track => track.stop());

            navigator.mediaDevices.getUserMedia({ video: { facingMode: usarCamaraFrontal ? "user" : "environment" } }).then(stream => {
                videoDOM.srcObject = stream;
                const escalaEspejo = usarCamaraFrontal ? "scaleX(-1)" : "scaleX(1)";
                videoDOM.style.transform = escalaEspejo;
                canvasDOM.style.transform = escalaEspejo;
                isReady = true; 
                labelEstado.innerText = "SISTEMA EN LÍNEA Y OPERATIVO";
                labelEstado.style.color = "#2ecc71";
            }).catch(err => {
                labelEstado.innerText = "Error: Por favor, conceda permisos de cámara.";
            });
        }

        function girarCamara() { usarCamaraFrontal = !usarCamaraFrontal; iniciarTransmisionVideo(); }

        // --- SISTEMA ANTI-LAG (SIN SETINTERVAL) ---
        videoDOM.addEventListener('play', () => {
            const dimensiones = { width: videoDOM.videoWidth || 400, height: videoDOM.videoHeight || 300 };
            faceapi.matchDimensions(canvasDOM, dimensiones);
            
            // Usamos requestAnimationFrame en lugar de setInterval para no ahogar el teléfono
            async function procesarFotograma() {
                if (videoDOM.paused || videoDOM.ended || !isReady) {
                    return setTimeout(() => procesarFotograma(), 100);
                }

                if (!isDetecting) {
                    isDetecting = true; // Bloqueamos para que no se amontonen las órdenes
                    try {
                        // inputSize bajo (160) para velocidad extrema
                        const opcionesRendimiento = new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.5 });
                        const deteccionesEnVivo = await faceapi.detectAllFaces(videoDOM, opcionesRendimiento);
                        
                        canvasDOM.getContext('2d').clearRect(0, 0, canvasDOM.width, canvasDOM.height);
                        faceapi.draw.drawDetections(canvasDOM, faceapi.resizeResults(deteccionesEnVivo, dimensiones));
                    } catch (e) { console.log(e); }
                    isDetecting = false; // Liberamos el candado
                }
                
                // Pedimos el siguiente fotograma solo cuando este terminó
                requestAnimationFrame(procesarFotograma); 
            }
            
            procesarFotograma();
        });

        // --- MARCAJE Y REGISTRO ---
        async function procesarMarcaje(tipoAccion) {
            const pinIngresado = document.getElementById('pinMarcaje').value.trim();
            
            if (pinIngresado !== "") {
                const usuarioEncontrado = dbUsuarios.find(usr => usr[2].toString() === pinIngresado);
                if (usuarioEncontrado) { enviarMarcajeAlServidor(usuarioEncontrado[0], "PIN", tipoAccion); } 
                else { alert("PIN incorrecto."); }
                return;
            }
            
            labelEstado.innerText = "Analizando Identidad..."; labelEstado.style.color = "#f39c12";

            const deteccionPrecision = await faceapi.detectSingleFace(videoDOM, new faceapi.SsdMobilenetv1Options()).withFaceLandmarks().withFaceDescriptor();
            if (!deteccionPrecision) {
                labelEstado.innerText = "SISTEMA OPERATIVO"; labelEstado.style.color = "#2ecc71";
                return alert("Rostro no detectado.");
            }
            
            let mejorCoincidencia = { nombre: "Desconocido", distancia: 1 };
            dbUsuarios.forEach(usr => {
                const descriptorDB = new Float32Array(JSON.parse(usr[1]));
                const distanciaCalculada = faceapi.euclideanDistance(deteccionPrecision.descriptor, descriptorDB);
                // UMBRAL SEGURO (0.40)
                if (distanciaCalculada < 0.40 && distanciaCalculada < mejorCoincidencia.distancia) {
                    mejorCoincidencia = { nombre: usr[0], distancia: distanciaCalculada };
                }
            });

            if (mejorCoincidencia.nombre !== "Desconocido") {
                enviarMarcajeAlServidor(mejorCoincidencia.nombre, "Rostro", tipoAccion);
            } else {
                labelEstado.innerText = "SISTEMA OPERATIVO"; labelEstado.style.color = "#2ecc71";
                alert("Usuario no reconocido.");
            }
        }

        async function enviarMarcajeAlServidor(nombre, metodo, accion) {
            labelEstado.innerText = "Sincronizando...";
            try {
                await fetch(URL_BACKEND, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: "marcaje", nombre, metodo, accion }) });
                alert(`✅ OPERACIÓN EXITOSA\nUsuario: ${nombre}\nAcción: ${accion}`); location.reload(); 
            } catch (error) { alert("Error al subir al servidor."); }
        }

        async function iniciarEscaneoRegistro() {
            labelEstado.innerText = "Extrayendo geometría...";
            const deteccion = await faceapi.detectSingleFace(videoDOM, new faceapi.SsdMobilenetv1Options()).withFaceLandmarks().withFaceDescriptor();
            if (deteccion) {
                descriptorFacialTemporal = Array.from(deteccion.descriptor);
                document.getElementById('btn-iniciar-scan').style.display = "none";
                document.getElementById('form-registro-oculto').style.display = "block";
                labelEstado.innerText = "Rostro Procesado.";
            } else { alert("Asegúrese de estar bien iluminado."); }
        }

        async function finalizarGuardadoUsuario() {
            const n = document.getElementById('regNombre').value.trim();
            const p = document.getElementById('regPin').value.trim();
            if (!n || !p) return alert("Complete los datos.");
            
            labelEstado.innerText = "Enviando a la nube...";
            try {
                await fetch(URL_BACKEND, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: "registro_facial", nombre: n, pin: p, descriptor: descriptorFacialTemporal }) });
                alert("¡Perfil creado!"); location.reload();
            } catch (e) { alert("Error de red."); }
        }

        // --- HISTORIAL Y PDF ---
        function renderizarTablaHistorial() {
            const valorFiltro = document.getElementById('filtroFecha').value;
            const cuerpoTabla = document.getElementById('cuerpoTablaHistorial');
            cuerpoTabla.innerHTML = "";
            
            dbHistorial.forEach(fila => {
                const objFecha = new Date(fila[3]);
                const fechaString = objFecha.toISOString().split('T')[0];
                if (!valorFiltro || fechaString === valorFiltro) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${fila[0]}</td><td>${fila[1]}</td><td>${fila[2]}</td><td>${objFecha.toLocaleTimeString()}</td>`;
                    cuerpoTabla.appendChild(tr);
                }
            });
        }

        function generarReporteInteligentePDF() {
            const { jsPDF } = window.jspdf;
            const documento = new jsPDF();
            const fechaInput = document.getElementById('filtroFecha').value;
            const fechaHoy = new Date();
            let titulo = "", datosFiltrados = [], frecuenciaNombres = {};

            if (fechaInput) {
                titulo = "REPORTE DE ASISTENCIA DIARIO";
                datosFiltrados = dbHistorial.filter(f => new Date(f[3]).toISOString().split('T')[0] === fechaInput);
            } else {
                const meses = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
                titulo = "INFORME MENSUAL - " + meses[fechaHoy.getMonth()] + " " + fechaHoy.getFullYear();
                datosFiltrados = dbHistorial.filter(f => { const d = new Date(f[3]); return d.getMonth() === fechaHoy.getMonth() && d.getFullYear() === fechaHoy.getFullYear(); });
            }

            documento.setFillColor(30, 30, 47); documento.rect(0, 0, 210, 40, 'F');
            documento.setTextColor(255); documento.setFontSize(16); documento.text(titulo, 15, 25);
            documento.setFontSize(10); documento.text("Exportado: " + fechaHoy.toLocaleString(), 15, 33);
            if(fechaInput) documento.text("Filtro: " + fechaInput, 150, 33);

            const filasTabla = [];
            datosFiltrados.forEach(fila => {
                const fObj = new Date(fila[3]);
                filasTabla.push([fila[0], fila[1], fila[2], fObj.toLocaleDateString() + " " + fObj.toLocaleTimeString()]);
                frecuenciaNombres[fila[0]] = (frecuenciaNombres[fila[0]] || 0) + 1;
            });

            documento.autoTable({ startY: 50, head: [['Empleado', 'Método', 'Movimiento', 'Fecha y Hora']], body: filasTabla, theme: 'striped', headStyles: { fillColor: [30, 30, 47] } });
            
            let posFinal = documento.lastAutoTable.finalY + 15;
            documento.setTextColor(0); documento.setFontSize(14); documento.text("Resumen de Actividad", 15, posFinal);
            
            let i = 1;
            Object.keys(frecuenciaNombres).forEach(nombre => {
                documento.setFontSize(10); 
                documento.text(`${i}. ${nombre}: ${frecuenciaNombres[nombre]} marcajes.`, 15, posFinal + 10 + (i * 7));
                i++;
            });
            
            documento.save("Reporte_Asistencia_" + (fechaInput ? fechaInput : "Mensual") + ".pdf");
        }

        let contB = 0; function intentarBloqueo() { contB++; if (contB === 3) { if (prompt("PIN:") === "1234") { fetch(URL_BACKEND, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: "cambiar_estado", nuevoEstado: "mantenimiento" }) }).then(() => location.reload()); } contB = 0; } setTimeout(() => contB = 0, 2000); }
        let contD = 0; function intentarDesbloqueo() { contD++; if (contD === 2) { if (prompt("PIN:") === "1234") { fetch(URL_BACKEND, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: "cambiar_estado", nuevoEstado: "activo" }) }).then(() => location.reload()); } contD = 0; } setTimeout(() => contD = 0, 2000); }

        arrancarSistema();
    </script>
</body>
</html>
