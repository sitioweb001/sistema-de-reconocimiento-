<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Marcaje Facial</title>
    <script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #1a1a2e; color: white; }
        .contenedor { margin-top: 20px; }
        video, canvas { position: absolute; left: 50%; transform: translateX(-50%); border-radius: 10px; }
        .controles { margin-top: 450px; }
        button { padding: 15px 25px; margin: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-reg { background: #0f3460; color: white; }
        .btn-ent { background: #28a745; color: white; }
        .btn-sal { background: #dc3545; color: white; }
        #estado { color: #e94560; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

    <h2>Sistema de Asistencia Facial</h2>
    <p id="estado">Cargando Inteligencia Artificial... (Por favor espera unos segundos)</p>

    <div class="contenedor">
        <video id="video" width="400" height="300" autoplay muted></video>
    </div>

    <div class="controles">
        <input type="text" id="nombreUsuario" placeholder="Nombre para registro" style="padding: 10px; border-radius: 5px;">
        <button class="btn-reg" onclick="registrarRostro()">1. Registrar Rostro</button>
        <br>
        <button class="btn-ent" onclick="identificarRostro('Entrada')">Marcar ENTRADA</button>
        <button class="btn-sal" onclick="identificarRostro('Salida')">Marcar SALIDA</button>
    </div>

    <script>
        // ¡IMPORTANTE! Pega tu URL de Apps Script aquí (la que termina en /exec)
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxwLkaOTgC9M8_z7_ZpmMspWK8L_0zr3RKmEuCy27VTSWKhOrriul91tff6RZFZPnKv/exec"; 
        
        const video = document.getElementById('video');
        let modelosCargados = false;
        let usuariosRegistrados = [];

        // SOLUCIÓN 2: Rutas de modelos más estables
        const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';

        // 1. Cargar Modelos y Cámara
        Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]).then(iniciarVideo).catch(err => {
            console.error("Error al cargar los modelos: ", err);
            document.getElementById('estado').innerText = "Error cargando la IA. Revisa la consola.";
        });

        function iniciarVideo() {
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then(stream => { 
                    video.srcObject = stream;
                    document.getElementById('estado').innerText = "Sistema Listo. Esperando Rostro...";
                    document.getElementById('estado').style.color = "#4caf50";
                    modelosCargados = true;
                    cargarUsuarios(); // Baja los datos de Google Sheets
                })
                .catch(err => {
                    console.error("Error de cámara: ", err);
                    document.getElementById('estado').innerText = "Error: No hay acceso a la cámara.";
                });
        }

        async function cargarUsuarios() {
            try {
                // Obtenemos los usuarios registrados desde tu Google Sheets
                const res = await fetch(URL_SCRIPT);
                usuariosRegistrados = await res.json();
                console.log("Usuarios cargados desde la nube:", usuariosRegistrados.length);
            } catch (e) { 
                console.error("Error cargando usuarios o no hay ninguno aún.", e); 
            }
        }

        // 2. Función para Registrar un nuevo usuario
        async function registrarRostro() {
            if (!modelosCargados) return alert("Espera a que cargue el sistema.");
            
            const nombre = document.getElementById('nombreUsuario').value;
            if (!nombre) return alert("Por favor, escribe tu nombre primero.");

            document.getElementById('estado').innerText = "Escaneando rostro para registro...";
            
            // Detecta el rostro
            const deteccion = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();

            if (deteccion) {
                const datos = {
                    tipo: "registro_facial",
                    nombre: nombre,
                    descriptor: Array.from(deteccion.descriptor) // Convierte el rostro a números
                };

                // Enviamos a Google Sheets
                try {
                    await fetch(URL_SCRIPT, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify(datos) 
                    });
                    document.getElementById('estado').innerText = "¡Rostro guardado exitosamente!";
                    alert("Rostro registrado. La página se recargará para actualizar los datos.");
                    location.reload(); // Recarga para descargar la lista actualizada
                } catch (error) {
                    alert("Error al enviar los datos a Google Sheets.");
                }
            } else {
                alert("No se detecta tu rostro. Ilumina mejor tu cara o acércate a la cámara.");
                document.getElementById('estado').innerText = "Sistema Listo. Esperando Rostro...";
            }
        }

        // 3. Función para Identificar y Marcar Asistencia
        async function identificarRostro(accion) {
            if (!modelosCargados) return alert("Espera a que cargue el sistema.");
            if (usuariosRegistrados.length === 0) return alert("No hay usuarios registrados en el sistema aún.");

            document.getElementById('estado').innerText = "Identificando...";
            
            // Detecta la cara que está en la cámara ahora mismo
            const deteccion = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();

            if (!deteccion) {
                document.getElementById('estado').innerText = "Sistema Listo. Esperando Rostro...";
                return alert("Rostro no detectado. Acércate más a la cámara.");
            }

            let mejorMatch = { nombre: "Desconocido", distancia: 1 };

            // Compara con todos los rostros bajados de Google Sheets
            usuariosRegistrados.forEach(usr => {
                const descriptorGuardado = new Float32Array(JSON.parse(usr[1]));
                const distancia = faceapi.euclideanDistance(deteccion.descriptor, descriptorGuardado);
                
                // Si la distancia es menor a 0.45, es la misma persona
                if (distancia < 0.45 && distancia < mejorMatch.distancia) {
                    mejorMatch = { nombre: usr[0], distancia: distancia };
                }
            });

            if (mejorMatch.nombre !== "Desconocido") {
                document.getElementById('estado').innerText = "¡Marcado! Hola, " + mejorMatch.nombre;
                
                const datos = { 
                    tipo: "marcaje", 
                    nombre: mejorMatch.nombre, 
                    accion: accion 
                };

                // Enviamos el marcaje a Google Sheets
                try {
                    await fetch(URL_SCRIPT, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify(datos) 
                    });
                    alert("Asistencia grabada (" + accion + "): " + mejorMatch.nombre);
                } catch (error) {
                    alert("Error al guardar asistencia en la nube.");
                }

                // Resetea el mensaje después de 3 segundos
                setTimeout(() => {
                    document.getElementById('estado').innerText = "Sistema Listo. Esperando Rostro...";
                }, 3000);

            } else {
                document.getElementById('estado').innerText = "Sistema Listo. Esperando Rostro...";
                alert("No te reconozco. Asegúrate de registrarte primero o acércate a la luz.");
            }
        }
    </script>
</body>
</html>
